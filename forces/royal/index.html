<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>皇家玉牒｜势力展示｜沉星尽春</title>
  <meta name="description" content="沉星尽春势力展示：皇家玉牒。" />
  <link rel="canonical" href="https://cxjc.whitemoon319.xyz/forces/royal/" />
  <link rel="icon" type="image/webp" href="../../resource/img/favicon.webp" />
  <link rel="stylesheet" href="../../resource/css/style.css" />
  <script defer src="../../resource/js/site-nav.js"></script>
  <style>
    .roster-wrap { max-width: 680px; margin: 0 auto; }
    .roster-back { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-serif); font-size: 0.85rem; color: var(--ink-mid); text-decoration: none; margin-bottom: 24px; transition: color var(--transition); }
    .roster-back:hover { color: var(--cinnabar); }
    .roster-table { width: 100%; border-collapse: collapse; }
    .roster-table th, .roster-table td { padding: 10px 0; text-align: left; font-size: 0.95rem; border-bottom: 1px solid var(--hairline); }
    .roster-table th { font-family: var(--font-serif); color: var(--ink-mid); font-weight: 400; font-size: 0.8rem; letter-spacing: 0.1em; }
    .roster-table td:first-child { width: 28%; padding-right: 16px; }
    .roster-note { font-size: 0.8rem; color: var(--ink-light); }
    .roster-holder { color: var(--ink-mid); }
    .roster-holder:empty::after { content: "——"; color: var(--ink-light); }
    .roster-link { color: var(--cinnabar); text-decoration: none; border-bottom: 1px dashed var(--cinnabar-line); transition: border-color var(--transition); }
    .roster-link:hover { border-bottom-style: solid; }
    @media (max-width: 599px) {
      .roster-table th, .roster-table td { font-size: 0.85rem; padding: 8px 0; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">跳至正文</a>
  <nav class="site-nav"><div class="site-nav-inner"><a class="site-logo" href="../../index.html"><img src="../../resource/img/logo.webp" alt="沉星尽春" /><span class="site-logo-text">沉星尽春</span></a><ul class="nav-links"><li><a class="nav-link" href="../../world/">卷首</a></li><li><a class="nav-link" href="../../preset/">固设</a></li><li><a class="nav-link" href="../../chars/">人设</a></li><li><a class="nav-link active" href="../">势力</a></li><li><a class="nav-link" href="../../timeline/">年表</a></li><li><a class="nav-link" href="../../index.html#about">跋</a></li></ul></div></nav>

  <main id="main-content" class="section">
    <a class="roster-back" href="../">← 返回势力总览</a>
    <div class="section-head reveal" style="text-align:left;margin-bottom:40px;">
      <span class="kicker" style="margin-left:0;">势 力</span>
      <h1 class="section-title" style="text-align:left;">皇家玉牒</h1>
      <p class="section-lead" id="roster-lead" style="margin:0;text-align:left;">皇族血脉，朱砂载录。</p>
    </div>
    <div class="roster-wrap" id="roster"></div>
    <p style="text-align:center;margin-top:56px;"><a class="btn btn-ghost" href="../">← 返回势力总览</a></p>
  </main>

  <footer class="site-footer"><img class="footer-seal" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='4' y='4' width='40' height='40' rx='6' fill='%23c23a30'/><text x='24' y='33' font-family='serif' font-size='24' fill='white' text-anchor='middle'>尽</text></svg>" alt="" /><h3>沉星尽春</h3><p>© 2026 ChenXingJinChun · 朱砂落墨 · 尽春长卷</p></footer>

  <script>
    async function loadRoster() {
      const el = document.getElementById('roster');
      try {
        const resp = await fetch('../../resource/data/royal.json');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        document.getElementById('roster-lead').textContent = '皇族血脉，朱砂载录。';
        document.title = data.title + '｜势力展示｜沉星尽春';
        let html = '<table class="roster-table"><thead><tr><th>称号</th><th>姓名</th><th>生卒</th><th>备注</th></tr></thead><tbody>';
        data.members.forEach(m => {
          const label = m.name || m.title;
          let nameCell;
          if (m.slug) {
            nameCell = '<a href="../../chars/' + m.slug + '/" class="roster-link">' + label + '</a>';
          } else if (m.preset) {
            nameCell = '<a href="../../preset/' + m.preset + '/" class="roster-link">' + label + '</a>';
          } else {
            nameCell = m.name || '';
          }
          html += '<tr><td>' + m.title + '</td><td><span class="roster-holder">' + nameCell + '</span></td><td>' + (m.life || '') + '</td><td class="roster-note">' + m.note + '</td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">玉牒数据暂未载入，待后续补充。</p>';
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
    }
    loadRoster();
  </script>
</body>
</html>
