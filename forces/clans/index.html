<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世家谱牒｜势力展示｜沉星尽春</title>
  <meta name="description" content="沉星尽春势力展示：世家谱牒。" />
  <link rel="canonical" href="https://cxjc.whitemoon319.xyz/forces/clans/" />
  <link rel="icon" type="image/webp" href="../../resource/img/favicon.webp" />
  <link rel="stylesheet" href="../../resource/css/style.css" />
  <script defer src="../../resource/js/site-nav.js"></script>
  <style>
    .clan-wrap { max-width: 720px; margin: 0 auto; }
    .clan-back { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-serif); font-size: 0.85rem; color: var(--ink-mid); text-decoration: none; margin-bottom: 24px; transition: color var(--transition); }
    .clan-back:hover { color: var(--cinnabar); }

    .clan-card { margin-bottom: 56px; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--paper-card); overflow: hidden; }

    .clan-hero { display: flex; align-items: center; gap: 16px; padding: 32px 36px; border-bottom: 1px solid var(--hairline); }
    .clan-seal { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-family: var(--font-brush); font-size: 1.6rem; color: #fff; background: var(--deep-blue); border-radius: var(--radius-sm); flex-shrink: 0; }
    .clan-hero h2 { font-family: var(--font-serif); font-size: 1.4rem; color: var(--ink-deep); margin: 0; letter-spacing: 0.1em; }

    .clan-bg { padding: 28px 36px; }
    .clan-bg p { font-family: var(--font-serif); font-size: 0.95rem; line-height: 1.9; color: var(--ink-mid); text-indent: 2em; margin: 0; }
    .clan-bg p + p { margin-top: 1em; }

    .clan-tree { padding: 0 36px 32px; }
    .clan-tree-title { font-family: var(--font-serif); font-size: 1rem; color: var(--cinnabar); border-bottom: 1px solid var(--cinnabar-line); padding-bottom: 6px; margin-bottom: 20px; letter-spacing: 0.15em; }

    .clan-gen { margin-bottom: 24px; padding-left: 20px; border-left: 2px solid var(--cinnabar-line); }
    .clan-gen:last-child { margin-bottom: 0; }
    .clan-gen-head { font-family: var(--font-serif); font-size: 0.9rem; color: var(--cinnabar); margin: 0 0 8px 0; letter-spacing: 0.12em; }

    .clan-table { width: 100%; border-collapse: collapse; }
    .clan-table th, .clan-table td { padding: 8px 0; text-align: left; font-size: 0.95rem; border-bottom: 1px solid var(--hairline); }
    .clan-table th { font-family: var(--font-serif); color: var(--ink-mid); font-weight: 400; font-size: 0.8rem; letter-spacing: 0.1em; }
    .clan-table td:first-child { width: 30%; padding-right: 16px; }
    .clan-holder { color: var(--ink-mid); }
    .clan-holder:empty::after { content: "——"; color: var(--ink-light); }
    .clan-link { color: var(--cinnabar); text-decoration: none; border-bottom: 1px dashed var(--cinnabar-line); transition: border-color var(--transition); }
    .clan-link:hover { border-bottom-style: solid; }
    .clan-note { font-size: 0.8rem; color: var(--ink-light); }

    @media (max-width: 599px) {
      .clan-gen { padding-left: 14px; }
    }

    @media (max-width: 599px) {
      .clan-hero { padding: 24px 20px; }
      .clan-bg { padding: 20px 20px; }
      .clan-tree { padding: 0 20px 24px; }
      .clan-bg p { font-size: 0.9rem; text-indent: 1.6em; }
      .clan-table th, .clan-table td { font-size: 0.85rem; padding: 8px 0; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">跳至正文</a>
  <nav class="site-nav"><div class="site-nav-inner"><a class="site-logo" href="../../index.html"><img src="../../resource/img/logo.webp" alt="沉星尽春" /><span class="site-logo-text">沉星尽春</span></a><ul class="nav-links"><li><a class="nav-link" href="../../world/">卷首</a></li><li><a class="nav-link" href="../../preset/">固设</a></li><li><a class="nav-link" href="../../chars/">人设</a></li><li><a class="nav-link active" href="../">势力</a></li><li><a class="nav-link" href="../../timeline/">年表</a></li><li><a class="nav-link" href="../../index.html#about">跋</a></li></ul></div></nav>

  <main id="main-content" class="section">
    <a class="clan-back" href="../">← 返回势力总览</a>
    <div class="section-head reveal" style="text-align:left;margin-bottom:40px;">
      <span class="kicker" style="margin-left:0;">势 力</span>
      <h1 class="section-title" style="text-align:left;">世家谱牒</h1>
      <p class="section-lead" id="clan-lead" style="margin:0;text-align:left;">文武鼎族，百年簪缨。</p>
    </div>
    <div class="clan-wrap" id="clans-container"></div>
    <p style="text-align:center;margin-top:56px;"><a class="btn btn-ghost" href="../">← 返回势力总览</a></p>
  </main>

  <footer class="site-footer"><img class="footer-seal" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='4' y='4' width='40' height='40' rx='6' fill='%23c23a30'/><text x='24' y='33' font-family='serif' font-size='24' fill='white' text-anchor='middle'>尽</text></svg>" alt="" /><h3>沉星尽春</h3><p>© 2026 ChenXingJinChun · 朱砂落墨 · 尽春长卷</p></footer>

  <script>
    async function loadClans() {
      const el = document.getElementById('clans-container');
      try {
        const resp = await fetch('../../resource/data/clans.json');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        document.title = data.title + '｜势力展示｜沉星尽春';
        let html = '';
        data.clans.forEach(clan => {
          html += '<div class="clan-card reveal">';
          html += '<div class="clan-hero">';
          html += '<div class="clan-seal">' + clan.seal + '</div>';
          html += '<h2>' + clan.name + '</h2>';
          html += '</div>';
          html += '<div class="clan-bg">';
          clan.background.split('\n\n').forEach(para => {
            if (para.trim()) html += '<p>' + para.trim().replace(/\n/g, '<br>') + '</p>';
          });
          html += '</div>';
          html += '<div class="clan-tree">';
          html += '<h3 class="clan-tree-title">族 谱</h3>';
          clan.generations.forEach(gen => {
            html += '<div class="clan-gen">';
            html += '<h4 class="clan-gen-head">' + gen.name + '</h4>';
            html += '<table class="clan-table"><thead><tr><th>称号</th><th>姓名</th><th>生卒</th><th>备注</th></tr></thead><tbody>';
            gen.members.forEach(m => {
              const label = m.name || m.title;
              let nameCell;
              if (m.slug) {
                nameCell = '<a href="../../chars/detail.html?slug=' + m.slug + '" class="clan-link">' + label + '</a>';
              } else if (m.preset) {
                nameCell = '<a href="../../preset/detail.html?slug=' + m.preset + '" class="clan-link">' + label + '</a>';
              } else {
                nameCell = m.name || '';
              }
              html += '<tr><td>' + m.title + '</td><td><span class="clan-holder">' + nameCell + '</span></td><td>' + (m.life || '') + '</td><td class="clan-note">' + m.note + '</td></tr>';
            });
            html += '</tbody></table></div>';
          });
          html += '</div>';
        });
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">世家数据暂未载入，待后续补充。</p>';
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
    }
    loadClans();
  </script>
</body>
</html>
