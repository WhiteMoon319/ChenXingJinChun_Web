  <main id="main-content" class="section">

      <span class="kicker">年 表</span>

  <button class="float-nav float-nav-pulse" id="floatNav" title="返回顶部">↑</button>

  <footer class="site-footer">
    <img class="footer-seal"
         src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='4' y='4' width='40' height='40' rx='6' fill='%23c23a30'/><text x='24' y='33' font-family='serif' font-size='24' fill='white' text-anchor='middle'>尽</text></svg>"

  </footer>

  <script>
    document.getElementById('floatNav').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    async function loadTimeline() {
      const el = document.getElementById('tl-content');
      try {
        const resp = await fetch('../resource/data/timeline.json');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        document.getElementById('tl-title').textContent = data.title;
        document.getElementById('tl-lead').textContent = data.lead;
        document.title = data.title + '｜剧情年表｜沉星尽春';
        let html = '';
        data.eras.forEach(era => {
          const ei = era.delay != null ? era.delay : 0;
          html += '<h3 class="tl-era reveal' + (ei === 0 ? ' in' : '') + '"'
            + (ei > 0 ? ' data-delay="' + ei + '"' : '')
            + '><span>' + era.name + '</span><small>' + era.subtitle + '</small></h3>';
          era.events.forEach(ev => {
            const di = ev.delay != null ? ev.delay : 0;
            html += '<div class="tl-item reveal"'
              + (di > 0 ? ' data-delay="' + di + '"' : '')
              + '><div class="tl-year">' + ev.year + '</div>'
              + '<p class="tl-event">' + ev.event + '</p>';
            if (ev.desc) {
              html += '<p class="tl-desc">' + ev.desc + '</p>';
            }
            html += '</div>';
          });
        });
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">年表数据暂未载入，待后续补充。</p>';
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
    }
    loadTimeline();
  </script>

</body>
</html>
