<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="沉星尽春待选皇子固设。" />
  <link rel="canonical" href="https://cxjc.whitemoon319.xyz/preset/" />
  <link rel="icon" type="image/webp" href="../resource/img/favicon.webp" />
  <link rel="stylesheet" href="../resource/css/style.css" />
  <script defer src="../resource/js/site-nav.js"></script>
</head>
<body>

  <a class="skip-link" href="#main-content">跳至正文</a>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a class="site-logo" href="../index.html">
        <img src="../resource/img/logo.webp" alt="" width="32" height="32" />
        <span class="site-logo-text">沉星尽春</span>
      </a>
      <ul class="nav-links">
        <li><a class="nav-link" href="../world/">卷首</a></li>
        <li><a class="nav-link active" href="./">固设</a></li>
        <li><a class="nav-link" href="../chars/">人设</a></li>
        <li><a class="nav-link" href="../forces/">势力</a></li>
        <li><a class="nav-link" href="../timeline/">年表</a></li>
        <li><a class="nav-link" href="../index.html#about">跋</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content" class="section">
    <div class="section-head reveal">
      <span class="kicker">固 设</span>
      <h1 class="section-title" id="ps-title">待选固设</h1>
      <p class="section-lead" id="ps-lead">今上五子，各有归途。择一入卷，点击可查看详细规则。</p>
    </div>

    <div class="chars settings-grid" id="ps-grid"></div>

    <div class="epigraph reveal" data-delay="1" style="padding:80px 24px 0;" id="ps-epigraph"></div>

    <p style="text-align:center;margin-top:48px;">
      <a class="btn btn-ghost" href="../index.html#portals">← 返回目录</a>
    </p>
  </main>

  <button class="float-nav float-nav-pulse" id="floatNav" title="返回顶部">↑</button>

  <footer class="site-footer">
    <img class="footer-seal"
         src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='4' y='4' width='40' height='40' rx='6' fill='%23c23a30'/><text x='24' y='33' font-family='serif' font-size='24' fill='white' text-anchor='middle'>尽</text></svg>"
         alt="" />
    <h3>沉星尽春</h3>
    <p>© 2026 ChenXingJinChun · 朱砂落墨 · 尽春长卷</p>
  </footer>

  <script>
    document.getElementById('floatNav').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    async function loadPresets() {
      const gridEl = document.getElementById('ps-grid');
      try {
        const resp = await fetch('../resource/data/presets.json');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        document.getElementById('ps-title').textContent = data.title;
        document.getElementById('ps-lead').textContent = data.lead;
        document.title = data.title + '｜沉星尽春';

        let html = '';
        data.presets.forEach((p, i) => {
          const delay = (([1, 2, 3, 1, 2][i] || 1) * 0.08).toFixed(2);
          html += '<a class="char-card setting-card reveal" data-preset="' + p.slug + '" href="detail.html?slug=' + p.slug + '" style="--cc: var(--cinnabar);transition-delay:' + delay + 's">'
            + '<div class="char-portrait">' + p.mark + '</div>'
            + '<div class="char-body">'
            + '<h3 class="char-name">' + p.name + '</h3>'
            + '<p class="char-title">' + p.hero.subtitle + '</p>'
            + '<p class="char-quote">' + (p.quote || '') + '</p>'
            + '<div class="char-meta"><span class="kingdom-tag">' + p.tag + '</span><span>' + p.age + '</span></div>'
            + '</div></a>';
        });
        gridEl.innerHTML = html;

        if (data.epigraph) {
          document.getElementById('ps-epigraph').innerHTML = '<div class="epigraph-mark">"</div>'
            + '<blockquote style="font-size:clamp(1.4rem,3.6vw,2rem);">' + data.epigraph + '</blockquote>'
            + '<cite>—— ' + (data.epigraphCite || '') + '</cite>';
        }

        markSelected(data);
      } catch (e) {
        gridEl.innerHTML = '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">固设数据暂未载入，待后续补充。</p>';
      }
      initObserver();
    }

    function markSelected(data) {
      const selected = data.selected;
      if (!Array.isArray(selected)) return;
      document.querySelectorAll('.char-card.setting-card[data-preset]').forEach(c => {
        const slug = c.getAttribute('data-preset');
        if (selected.includes(slug)) {
            c.classList.add('preset-card-selected');
            const badge = document.createElement('span');
            badge.className = 'preset-selected-badge';
            badge.textContent = '已选';
            c.appendChild(badge);
          }
        });
    }

    function initObserver() {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
    }

    loadPresets();
  </script>

</body>
</html>
