<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="朱砂所点，群像登场。" />

  <link rel="icon" type="image/webp" href="../resource/img/favicon.webp" />
  <link rel="stylesheet" href="../resource/css/style.css" />
  <script defer src="../resource/js/site-nav.js"></script>
</head>
<body>

  <a class="skip-link" href="#main-content">跳至正文</a>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a class="site-logo" href="../index.html">
        <img src="../resource/img/logo.webp" alt="" width="32" height="32" />
        <span class="site-logo-text">沉星尽春</span>
      </a>
      <ul class="nav-links">
        <li><a class="nav-link" href="../world/">卷首</a></li>
        <li><a class="nav-link" href="../preset/">固设</a></li>
        <li><a class="nav-link active" href="./">人设</a></li>
        <li><a class="nav-link" href="../forces/">势力</a></li>
        <li><a class="nav-link" href="../timeline/">年表</a></li>
        <li><a class="nav-link" href="../index.html#about">跋</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content" class="section">
    <div class="section-head reveal in">
      <span class="kicker">人 设</span>
      <h1 class="section-title" id="chars-title">朱砂所点</h1>
      <p class="section-lead" id="chars-lead">朱砂所点，群像登场。点击查看各人物详情卷宗。</p>
    </div>

    <div class="chars" id="chars-grid"></div>

    <p style="text-align:center;margin-top:56px;">
      <a class="btn btn-ghost" href="../index.html#portals">← 返回目录</a>
    </p>
  </main>

  <button class="float-nav float-nav-pulse" id="floatNav" title="返回顶部">↑</button>

  <footer class="site-footer">
    <img class="footer-seal"
         src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='4' y='4' width='40' height='40' rx='6' fill='%23c23a30'/><text x='24' y='33' font-family='serif' font-size='24' fill='white' text-anchor='middle'>尽</text></svg>"
         alt="" />
    <h3>沉星尽春</h3>
    <p>© 2026 ChenXingJinChun · 朱砂落墨 · 尽春长卷</p>
  </footer>

  <script>
    document.getElementById('floatNav').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    async function loadChars() {
      const gridEl = document.getElementById('chars-grid');
      try {
        const resp = await fetch('../resource/data/chars.json');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        document.getElementById('chars-title').textContent = data.title;
        document.getElementById('chars-lead').textContent = data.lead;
        document.title = data.title + '｜沉星尽春';

        let html = '';
        data.list.forEach((slug, i) => {
          const c = data.characters[slug];
          if (!c) return;
          const delay = ((i + 1) * 0.08).toFixed(2);
          html += '<a class="char-card reveal" href="detail.html?slug=' + slug + '" style="--cc: var(--cinnabar);transition-delay:' + delay + 's">'
            + '<div class="char-portrait">' + c.mark + '</div>'
            + '<div class="char-body">'
            + '<h3 class="char-name">' + c.name + '</h3>'
            + '<p class="char-title">外貌 · 衣着 · 经历 · 性格 · 备注</p>'
            + '<p class="char-quote">' + ((c.quote && c.quote.replace(/\n/g,'').length > 20) ? c.quote.replace(/\n/g,'').substring(0,20) + '...' : (c.quote || '')) + '</p>'
            + '<div class="char-meta">'
            + '<span class="kingdom-tag">' + (c.faction || '') + '</span>'
            + '<span>' + (c.status || '') + '</span>'
            + '</div></div></a>';
        });
        gridEl.innerHTML = html || '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">人物卷宗尚未录入，待正式设定后逐一补全。</p>';
      } catch (e) {
        gridEl.innerHTML = '<p style="text-align:center;color:var(--ink-mid);padding:40px 0;">人物数据暂未载入，待后续补充。</p>';
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
    }
    loadChars();
  </script>

</body>
</html>
